<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>策略思考引導器 · 謙謙爸工具箱</title>
<meta name="description" content="15 分鐘策略思考引導器：先問對的問題，再決定做什麼">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="策略思考">
<meta name="theme-color" content="#0e0d0b">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Noto+Serif+TC:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --phase-0: #e0b454;
    --phase-1: #54c2a2;
    --phase-2: #86a6da;
    --phase-3: #b988dc;
    --ease: cubic-bezier(0.22, 1, 0.36, 1);
    --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  :root, [data-theme="dark"] {
    --bg: #0e0d0b; --bg2: #14120f;
    --surface: #1a1916; --surface-hi: #201e1a; --surface2: #242220;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.14);
    --text: #f3f0e9; --muted: #8b8680; --muted2: #6b6660;
    --amber: #e0b454; --amber-dim: #8a6e2a; --amber-glow: rgba(224,180,84,0.15);
    --teal: #54c2a2; --teal-dim: #2a6e56;
    --red: #e86756;
    --on-accent: #15120c;
    --scrim: rgba(8,7,6,0.75);
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.25);
    --shadow-md: 0 8px 30px rgba(0,0,0,0.35);
    --shadow-lg: 0 20px 60px rgba(0,0,0,0.5);
  }

  [data-theme="light"] {
    --bg: #f4efe3; --bg2: #efe8d8;
    --surface: #fffdf8; --surface-hi: #fffefb; --surface2: #f1ebdd;
    --border: rgba(58,44,20,0.10); --border2: rgba(58,44,20,0.18);
    --text: #2c2418; --muted: #7c7160; --muted2: #a39884;
    --amber: #a9761c; --amber-dim: #cba656; --amber-glow: rgba(169,118,28,0.14);
    --teal: #2c8e72; --teal-dim: #95c8b8;
    --red: #c0432f;
    --on-accent: #fffdf8;
    --scrim: rgba(238,231,216,0.75);
    --shadow-sm: 0 1px 3px rgba(70,52,22,0.08);
    --shadow-md: 0 10px 30px rgba(70,52,22,0.12);
    --shadow-lg: 0 22px 60px rgba(70,52,22,0.18);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif TC', serif;
    min-height: 100vh;
    padding-bottom: 4rem;
    transition: background 0.3s, color 0.3s;
  }

  /* TOPBAR */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
    backdrop-filter: blur(12px);
  }

  .back-link {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--muted);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--teal); }

  .topbar-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--muted2);
    text-transform: uppercase;
  }

  .theme-btn {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 6px 10px;
    cursor: pointer;
    font-size: 13px;
    color: var(--muted);
    transition: all 0.2s;
  }
  .theme-btn:hover { color: var(--text); }

  /* MAIN */
  main {
    max-width: 560px;
    margin: 0 auto;
    padding: 2rem 1.5rem 0;
  }

  /* SETUP SCREEN */
  #setupScreen { animation: fadeUp 0.4s var(--ease) both; }

  .setup-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 0.75rem;
  }

  .setup-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.7rem, 5vw, 2.2rem);
    line-height: 1.2;
    color: var(--text);
    margin-bottom: 0.5rem;
    letter-spacing: -0.02em;
  }

  .setup-sub {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.7;
    margin-bottom: 2rem;
  }

  .setup-field {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 1rem;
    transition: border-color 0.2s;
  }
  .setup-field:focus-within { border-color: var(--teal-dim); }

  .setup-field label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--teal);
    padding: 12px 16px 4px;
  }

  .setup-field input, .setup-field textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    padding: 4px 16px 14px;
    font-size: 14px;
    font-family: 'Noto Serif TC', serif;
    color: var(--text);
    line-height: 1.6;
    resize: none;
  }
  .setup-field input::placeholder, .setup-field textarea::placeholder { color: var(--muted2); font-size: 13px; }

  .start-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(180deg, #62cfae, var(--teal));
    border: none;
    border-radius: 14px;
    color: var(--on-accent);
    font-size: 15px;
    font-weight: 600;
    font-family: 'Noto Serif TC', serif;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(84,194,162,0.3);
    transition: all 0.2s var(--ease);
    margin-top: 0.5rem;
  }
  .start-btn:hover { filter: brightness(1.06); transform: translateY(-1px); }
  .start-btn:active { transform: translateY(0) scale(0.98); }
  .start-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; filter: none; }

  /* TIMELINE */
  #appScreen { display: none; animation: fadeUp 0.4s var(--ease) both; }

  .timeline {
    display: flex;
    gap: 5px;
    margin-bottom: 1.75rem;
  }

  .tl-seg {
    flex: 1;
    height: 4px;
    border-radius: 3px;
    background: var(--surface2);
    position: relative;
    cursor: pointer;
    transition: transform 0.2s var(--ease);
  }
  .tl-seg:hover { transform: scaleY(1.6); }
  .tl-seg::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 3px;
    transform-origin: left;
    transform: scaleX(0);
    transition: transform 0.5s var(--ease);
  }
  .tl-seg[data-i="0"]::after { background: var(--phase-0); box-shadow: 0 0 6px var(--phase-0); }
  .tl-seg[data-i="1"]::after { background: var(--phase-1); box-shadow: 0 0 6px var(--phase-1); }
  .tl-seg[data-i="2"]::after { background: var(--phase-2); box-shadow: 0 0 6px var(--phase-2); }
  .tl-seg[data-i="3"]::after { background: var(--phase-3); box-shadow: 0 0 6px var(--phase-3); }
  .tl-seg.done::after { transform: scaleX(1); }

  /* ARC TIMER */
  .arc-wrap {
    background: linear-gradient(180deg, var(--surface-hi), var(--surface));
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 20px 22px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 18px;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    transition: border-color 0.4s var(--ease), box-shadow 0.4s var(--ease);
  }

  .arc-wrap::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(80% 120% at 12% 0%, var(--phase-tint, rgba(84,194,162,0.07)), transparent 60%);
    pointer-events: none;
    transition: background 0.5s;
  }

  .arc-svg { flex-shrink: 0; filter: drop-shadow(0 0 8px var(--phase-tint, rgba(84,194,162,0.2))); }

  .arc-info { flex: 1; position: relative; z-index: 1; }
  .arc-label { font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--muted2); margin-bottom: 4px; }
  .arc-time { font-family: 'DM Serif Display', serif; font-size: 2.6rem; color: var(--amber); letter-spacing: -0.03em; line-height: 1; font-variant-numeric: tabular-nums; transition: color 0.4s; }
  .arc-time.warning { color: var(--red); animation: warnPulse 1s ease-in-out infinite; }
  .arc-phase-name { font-size: 13px; color: var(--text); margin-top: 6px; }
  .arc-phase-sub { font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.4; }

  @keyframes warnPulse { 0%,100% { opacity:1; } 50% { opacity:0.55; } }

  .timer-ctrl { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }

  .ctrl-btn {
    padding: 8px 14px;
    border-radius: 9px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text);
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.18s var(--ease);
  }
  .ctrl-btn:hover { background: var(--surface-hi); transform: translateY(-1px); }
  .ctrl-btn.primary { background: var(--phase-color, var(--teal)); border-color: transparent; color: var(--on-accent); font-weight: 500; }
  .ctrl-btn.primary:hover { filter: brightness(1.08); }

  /* PHASE CARDS */
  .phases { display: flex; flex-direction: column; gap: 11px; }

  .phase-card {
    background: linear-gradient(180deg, var(--surface-hi), var(--surface));
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    transition: border-color 0.35s var(--ease), box-shadow 0.35s var(--ease), transform 0.35s var(--ease), opacity 0.35s;
  }
  .phase-card.active {
    border-color: var(--phase-color, var(--teal));
    box-shadow: 0 0 0 1px var(--phase-color, var(--teal)), 0 14px 40px var(--phase-glow, rgba(84,194,162,0.12)), inset 0 1px 0 rgba(255,255,255,0.04);
    transform: translateY(-1px);
  }
  .phase-card.done { opacity: 0.5; }
  .phase-card.done:hover { opacity: 0.85; }

  .phase-head {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; cursor: pointer; user-select: none;
  }

  .phase-badge {
    width: 32px; height: 32px; border-radius: 9px;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: var(--muted); flex-shrink: 0;
    font-family: 'DM Mono', monospace;
    transition: all 0.35s var(--ease-spring);
  }
  .phase-card.active .phase-badge { background: var(--phase-color); color: var(--on-accent); box-shadow: 0 4px 12px var(--phase-glow); transform: scale(1.05); }
  .phase-card.done .phase-badge { background: rgba(84,194,162,0.15); color: var(--teal); }

  .phase-head-info { flex: 1; min-width: 0; }
  .phase-head-title { font-size: 14px; color: var(--text); font-weight: 500; }
  .phase-head-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .phase-mins {
    font-size: 11px; color: var(--muted2);
    font-family: 'DM Mono', monospace;
    background: var(--surface2); padding: 3px 7px; border-radius: 5px;
  }
  .phase-card.active .phase-mins { color: var(--phase-color); background: var(--phase-glow); }

  .phase-body {
    display: none; padding: 4px 16px 16px;
    border-top: 1px solid var(--border);
  }
  .phase-card.expanded .phase-body { display: block; animation: bodyIn 0.35s var(--ease); }
  @keyframes bodyIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }

  /* FIELDS */
  .sfields { display: flex; flex-direction: column; gap: 10px; padding: 12px 0; }

  .sfield {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden; transition: border-color 0.2s;
  }
  .sfield:focus-within { border-color: var(--phase-color, var(--teal-dim)); }

  .sfield-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 8px 12px 0; color: var(--phase-color, var(--teal));
  }
  .sfield-hint {
    font-size: 11px; color: var(--muted);
    padding: 2px 12px 6px; line-height: 1.45;
    border-bottom: 1px solid var(--border);
  }
  .sfield-textarea {
    width: 100%; background: transparent; border: none; outline: none;
    padding: 10px 12px; font-size: 13px; font-family: 'Noto Serif TC', serif;
    color: var(--text); line-height: 1.6; resize: none; min-height: 60px;
  }
  .sfield-textarea::placeholder { color: var(--muted2); font-size: 12px; }
  .sfield-textarea:disabled { opacity: 0.4; cursor: not-allowed; }

  /* EMOTION CHECK */
  .emo-grid { display: flex; flex-wrap: wrap; gap: 7px; padding: 12px 0 4px; }
  .emo-btn {
    padding: 8px 13px; border-radius: 9px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted); font-size: 12px; font-family: 'Noto Serif TC', serif;
    cursor: pointer; transition: all 0.2s var(--ease);
  }
  .emo-btn:hover { border-color: var(--border2); color: var(--text); }
  .emo-btn.selected { background: var(--phase-0); border-color: transparent; color: var(--on-accent); font-weight: 500; box-shadow: 0 4px 12px rgba(224,180,84,0.25); }

  .emo-warn {
    font-size: 12px; color: var(--red); line-height: 1.55;
    background: rgba(232,103,86,0.08); border: 1px solid rgba(232,103,86,0.2);
    border-radius: 9px; padding: 10px 13px;
    display: none; margin-top: 4px;
  }
  .emo-warn.vis { display: block; animation: bodyIn 0.3s var(--ease); }

  /* PRIORITY LIST */
  .priority-list { display: flex; flex-direction: column; gap: 7px; padding-top: 10px; }
  .priority-item {
    display: flex; align-items: flex-start; gap: 10px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 12px; transition: all 0.2s;
  }
  .priority-item.selected-item {
    border-color: var(--phase-2);
    box-shadow: 0 0 0 1px var(--phase-2), 0 4px 12px rgba(134,166,218,0.15);
  }
  .priority-item.deprioritized { opacity: 0.4; }
  .priority-item textarea {
    flex: 1; background: transparent; border: none; outline: none;
    font-size: 13px; font-family: 'Noto Serif TC', serif;
    color: var(--text); resize: none; min-height: 22px; line-height: 1.5;
  }
  .priority-item textarea::placeholder { color: var(--muted2); font-size: 12px; }
  .priority-pick {
    flex-shrink: 0; width: 22px; height: 22px; border-radius: 6px;
    background: var(--surface); border: 1px solid var(--border2);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: var(--muted2); transition: all 0.2s;
    margin-top: 1px;
  }
  .priority-pick:hover { border-color: var(--phase-2); color: var(--phase-2); }
  .selected-item .priority-pick { background: var(--phase-2); border-color: transparent; color: var(--on-accent); }

  .priority-hint { font-size: 11px; color: var(--muted); line-height: 1.55; padding-top: 4px; }

  /* NEXT BTN */
  .phase-next {
    width: 100%; padding: 13px;
    background: var(--phase-color, var(--teal)); border: none; border-radius: 10px;
    color: var(--on-accent); font-size: 13px; font-weight: 500;
    font-family: 'Noto Serif TC', serif;
    cursor: pointer; margin-top: 12px;
    box-shadow: 0 4px 14px var(--phase-glow, rgba(84,194,162,0.25));
    transition: all 0.2s var(--ease);
  }
  .phase-next:hover { filter: brightness(1.07); transform: translateY(-1px); }
  .phase-next:disabled { opacity: 0.35; cursor: not-allowed; transform: none; filter: none; }

  /* SUMMARY */
  #summaryScreen {
    display: none;
    animation: fadeUp 0.45s var(--ease) both;
  }

  .summary-hero {
    text-align: center; padding: 2rem 0 1.5rem;
  }

  .summary-check {
    width: 56px; height: 56px; border-radius: 50%;
    background: linear-gradient(180deg, #62cfae, var(--teal));
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; margin: 0 auto 1rem;
    box-shadow: 0 8px 24px rgba(84,194,162,0.35);
    animation: popIn 0.5s var(--ease-spring) both;
  }

  .summary-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem; color: var(--text); line-height: 1.3;
    margin-bottom: 0.5rem;
  }

  .summary-sub { font-size: 13px; color: var(--muted); line-height: 1.6; }

  .summary-card {
    background: linear-gradient(180deg, var(--surface-hi), var(--surface));
    border: 1px solid var(--border); border-radius: 16px;
    padding: 18px 20px; margin-bottom: 12px;
  }

  .summary-card-label {
    font-family: 'DM Mono', monospace; font-size: 10px;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--teal); margin-bottom: 8px;
  }

  .summary-card-content {
    font-size: 13px; color: var(--text); line-height: 1.7;
    white-space: pre-wrap;
  }

  .summary-btns { display: flex; gap: 10px; margin-top: 1.5rem; flex-wrap: wrap; }

  .copy-btn {
    flex: 1; padding: 13px;
    background: linear-gradient(180deg, #62cfae, var(--teal));
    border: none; border-radius: 11px;
    color: var(--on-accent); font-size: 13px; font-weight: 500;
    font-family: inherit; cursor: pointer;
    box-shadow: 0 6px 20px rgba(84,194,162,0.3);
    transition: all 0.2s var(--ease);
  }
  .copy-btn:hover { filter: brightness(1.05); transform: translateY(-1px); }

  .restart-btn {
    flex: 1; padding: 13px;
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 11px; color: var(--muted); font-size: 13px;
    font-family: inherit; cursor: pointer; transition: all 0.2s;
  }
  .restart-btn:hover { color: var(--text); }

  @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  @keyframes popIn { from { opacity:0; transform:scale(0.8); } to { opacity:1; transform:scale(1); } }

  @media (max-width: 480px) {
    main { padding: 1.5rem 1.25rem 0; }
    .arc-time { font-size: 2rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }
</style>
</head>
<body>

<div class="topbar">
  <a class="back-link" href="../">← 工具箱</a>
  <span class="topbar-title">策略思考引導器</span>
  <button class="theme-btn" onclick="toggleTheme()">☀︎</button>
</div>

<main>

<!-- SETUP -->
<div id="setupScreen">
  <p class="setup-eyebrow">15 分鐘 · 4 個階段</p>
  <h1 class="setup-title">先問對的問題<br>再決定做什麼</h1>
  <p class="setup-sub">當你感覺在救火、事情做不完、或不確定方向對不對——<br>用這個工具強制慢下來。</p>

  <div class="setup-field">
    <label for="topicInput">這次要思考的主題</label>
    <input id="topicInput" type="text" placeholder="例：Q3 工作計畫、要不要推動 X 專案…" oninput="checkSetup()">
  </div>

  <button class="start-btn" id="startBtn" onclick="startApp()" disabled>開始思考 →</button>
</div>

<!-- APP -->
<div id="appScreen">

  <div class="timeline" id="timeline"></div>

  <div class="arc-wrap" id="arcWrap">
    <svg class="arc-svg" width="56" height="56" viewBox="0 0 56 56">
      <circle cx="28" cy="28" r="22" fill="none" stroke="var(--surface2)" stroke-width="4"/>
      <circle id="arcCircle" cx="28" cy="28" r="22" fill="none"
        stroke="var(--teal)" stroke-width="4" stroke-linecap="round"
        stroke-dasharray="138.2" stroke-dashoffset="138.2"
        transform="rotate(-90 28 28)"
        style="transition: stroke-dashoffset 1s linear, stroke 0.4s;"/>
    </svg>
    <div class="arc-info">
      <div class="arc-label">剩餘時間</div>
      <div class="arc-time" id="arcTime">—</div>
      <div class="arc-phase-name" id="arcPhaseName">—</div>
      <div class="arc-phase-sub" id="arcPhaseSub"></div>
    </div>
  </div>

  <div class="timer-ctrl">
    <button class="ctrl-btn primary" id="timerBtn" onclick="toggleTimer()">▶ 開始計時</button>
    <button class="ctrl-btn" onclick="resetTimer()">↺ 重設</button>
  </div>

  <div style="height:1.25rem"></div>
  <div class="phases" id="phases"></div>

</div>

<!-- SUMMARY -->
<div id="summaryScreen">
  <div class="summary-hero">
    <div class="summary-check">✓</div>
    <div class="summary-title" id="summaryTitle">思考完成</div>
    <div class="summary-sub">以下是本次的策略快照，複製後貼入 Obsidian。</div>
  </div>

  <div id="summaryCards"></div>

  <div class="summary-btns">
    <button class="copy-btn" onclick="copyMarkdown()">複製 Markdown ↗</button>
    <button class="restart-btn" onclick="restart()">開始新一輪</button>
  </div>
  <div style="height:2rem"></div>
</div>

</main>

<script>
  /* ════════════════ 簽名保護區 ── 任何版本迭代必須原樣保留本區塊 ⚠️
   SIG.a = 作者署名（Base64，執行期由 sigA() 解碼）
   SIG.d = 作品 DNA 碼　SIG.v = 目前版本
   sigK() = 署名校驗雜湊【演算法已凍結，永不可更改：
            h = h*31 + charCode，無號 32 位元，輸出 36 進位】
   版權所有 © 2026 謙謙爸 (Jerry). All Rights Reserved.
   ════════════════════════════════════════════════════════ */
  var SIG={a:'6KyZ6KyZ54i4',d:'Strategic-Thinking-2026',v:'1.0'};
  function sigA(){try{return decodeURIComponent(escape(atob(SIG.a)));}catch(err){return '';}}
  function sigK(s){var h=0;for(var i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))>>>0;}return h.toString(36);}
  var APP_AUTHOR=sigA();
  /* ════════════════ 簽名保護區結束 ════════════════ */

// ── DATA ──────────────────────────────────────────────────
const PHASES = [
  {
    title: '情緒 Check-in',
    sub: '現在的狀態適合策略思考嗎？',
    mins: 2,
    color: '#e0b454',
    glow: 'rgba(224,180,84,0.15)',
    type: 'emotion'
  },
  {
    title: 'Zoom Out 三問',
    sub: '先確認問題，再決定方向',
    mins: 5,
    color: '#54c2a2',
    glow: 'rgba(84,194,162,0.15)',
    type: 'zoomout',
    fields: [
      { key: 'q1', label: '解決什麼問題？', hint: '描述現象背後的真正痛點，而非表面症狀', placeholder: '例：不是「事情太多」，而是「沒有判斷優先序的機制」' },
      { key: 'q2', label: '為誰？', hint: '最終受益的人是誰？利害關係人有哪些？', placeholder: '例：自己、團隊、服務對象…' },
      { key: 'q3', label: '為何是現在？', hint: '什麼條件讓這件事現在值得處理？', placeholder: '例：截止日、機會窗口、資源到位…' }
    ]
  },
  {
    title: '無情取捨',
    sub: '只能選一個「最能移動指針」的行動',
    mins: 5,
    color: '#86a6da',
    glow: 'rgba(134,166,218,0.15)',
    type: 'priority'
  },
  {
    title: '一句話策略',
    sub: '可以重複說、讓人記住的那句話',
    mins: 3,
    color: '#b988dc',
    glow: 'rgba(185,136,220,0.15)',
    type: 'sentence',
    fields: [
      { key: 'strategy', label: '一句話策略', hint: '格式：我們要為 [誰] 做 [什麼]，讓 [什麼結果] 發生', placeholder: '例：我們要為忙碌的自己設計一個強制慢下來的儀式，讓思考品質不被緊急事務吞噬' }
    ]
  }
];

const EMOTIONS = [
  { label: '😌 清醒專注', val: 'ok' },
  { label: '🌿 平靜沉著', val: 'ok' },
  { label: '😶 有點茫', val: 'warn', msg: '💡 茫然時策略思考反而有幫助——帶著問題走完流程，通常能找到方向。繼續吧。' },
  { label: '😰 焦慮緊繃', val: 'bad', msg: '⚠️ 焦慮狀態下容易高估風險、把症狀當問題。建議先做 5 分鐘深呼吸或散步，再回來。' },
  { label: '🔥 衝動激動', val: 'bad', msg: '⚠️ 衝動時容易跳到戰術，跳過問題定義。建議稍作冷靜後再繼續——這個工具需要你的理性腦。' },
  { label: '😴 疲憊耗竭', val: 'bad', msg: '⚠️ 疲憊時大腦傾向最熟悉的選項，不是最好的選項。休息後再來，效果會更好。' }
];

// ── STATE ─────────────────────────────────────────────────
let topic = '';
let currentPhase = 0;
let notes = {};         // { phaseIndex: { key: value } }
let priorityItems = []; // ['', '', '', '', '']
let selectedPriority = -1;
let selectedEmo = null;
let timerInterval = null;
let timerRunning = false;
let timerSec = 0;
let timerTotal = 0;

// ── SETUP ─────────────────────────────────────────────────
function checkSetup() {
  const v = document.getElementById('topicInput').value.trim();
  document.getElementById('startBtn').disabled = v.length === 0;
}

function startApp() {
  topic = document.getElementById('topicInput').value.trim();
  priorityItems = ['', '', '', '', ''];
  notes = {};
  selectedPriority = -1;
  selectedEmo = null;
  currentPhase = 0;

  document.getElementById('setupScreen').style.display = 'none';
  const app = document.getElementById('appScreen');
  app.style.display = 'block';

  buildTimeline();
  buildPhases();
  setPhase(0);
}

// ── TIMELINE ──────────────────────────────────────────────
function buildTimeline() {
  const tl = document.getElementById('timeline');
  tl.innerHTML = PHASES.map((p, i) => `<div class="tl-seg" data-i="${i}" onclick="jumpTo(${i})" title="${p.title}"></div>`).join('');
}

function markTimelineDone(i) {
  document.querySelector(`.tl-seg[data-i="${i}"]`).classList.add('done');
}

// ── PHASES BUILD ──────────────────────────────────────────
function buildPhases() {
  const container = document.getElementById('phases');
  container.innerHTML = PHASES.map((p, i) => `
    <div class="phase-card" id="pc${i}" style="--phase-color:${p.color};--phase-glow:${p.glow}">
      <div class="phase-head" onclick="toggleExpand(${i})">
        <div class="phase-badge">${i+1}</div>
        <div class="phase-head-info">
          <div class="phase-head-title">${p.title}</div>
          <div class="phase-head-sub">${p.sub}</div>
        </div>
        <div class="phase-mins">${p.mins}m</div>
      </div>
      <div class="phase-body" id="pb${i}">
        ${buildPhaseBody(p, i)}
        <button class="phase-next" id="pnext${i}" onclick="nextPhase(${i})" disabled>
          ${i < PHASES.length - 1 ? '完成，進下一階段 →' : '完成思考，查看結果 ✓'}
        </button>
      </div>
    </div>
  `).join('');

  // init priority items
  renderPriorityItems();
}

function buildPhaseBody(p, i) {
  if (p.type === 'emotion') {
    return `
      <div class="emo-grid">
        ${EMOTIONS.map(e => `<button class="emo-btn" onclick="selectEmo(this,'${e.val}','${(e.msg||'').replace(/'/g,"&#39;")}')">${e.label}</button>`).join('')}
      </div>
      <div class="emo-warn" id="emoWarn"></div>
    `;
  }
  if (p.type === 'priority') {
    return `
      <p class="priority-hint" style="padding:12px 0 4px">列出手上 3–5 個待辦或選項，然後挑出最能移動指針的那一個。其他暫緩。</p>
      <div class="priority-list" id="priorityList"></div>
    `;
  }
  if (p.fields) {
    return `<div class="sfields">${p.fields.map(f => `
      <div class="sfield">
        <div class="sfield-label">${f.label}</div>
        <div class="sfield-hint">${f.hint}</div>
        <textarea class="sfield-textarea" rows="2"
          placeholder="${f.placeholder}"
          oninput="saveNote(${i},'${f.key}',this.value);checkNext(${i})"
          id="f${i}_${f.key}"></textarea>
      </div>
    `).join('')}</div>`;
  }
  return '';
}

function renderPriorityItems() {
  const list = document.getElementById('priorityList');
  if (!list) return;
  list.innerHTML = priorityItems.map((v, i) => `
    <div class="priority-item ${selectedPriority===i?'selected-item':''} ${selectedPriority>=0&&selectedPriority!==i?'deprioritized':''}" id="pi${i}">
      <textarea rows="1" placeholder="選項 ${i+1}…"
        oninput="priorityItems[${i}]=this.value;checkNext(2)"
        onfocus="this.style.minHeight='22px'"
      >${v}</textarea>
      <div class="priority-pick" onclick="pickPriority(${i})" title="選為最優先">
        ${selectedPriority===i ? '✓' : ''}
      </div>
    </div>
  `).join('');
}

function pickPriority(i) {
  selectedPriority = selectedPriority === i ? -1 : i;
  renderPriorityItems();
  checkNext(2);
}

// ── PHASE LOGIC ───────────────────────────────────────────
function setPhase(i) {
  currentPhase = i;
  const p = PHASES[i];

  // update arc
  document.getElementById('arcPhaseName').textContent = `階段 ${i+1}：${p.title}`;
  document.getElementById('arcPhaseSub').textContent = p.sub;
  document.getElementById('arcWrap').style.setProperty('--phase-tint', p.glow);
  document.getElementById('arcCircle').style.stroke = p.color;
  document.getElementById('arcWrap').style.setProperty('--phase-color', p.color);

  // reset timer
  clearTimer();
  timerTotal = p.mins * 60;
  timerSec = timerTotal;
  renderTimer();

  // update cards
  document.querySelectorAll('.phase-card').forEach((c, j) => {
    c.classList.toggle('active', j === i);
    c.classList.toggle('expanded', j === i);
  });

  // scroll
  setTimeout(() => {
    document.getElementById(`pc${i}`)?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 100);

  checkNext(i);
}

function toggleExpand(i) {
  const card = document.getElementById(`pc${i}`);
  card.classList.toggle('expanded');
}

function jumpTo(i) {
  if (i <= currentPhase) setPhase(i);
}

function nextPhase(i) {
  markTimelineDone(i);
  document.getElementById(`pc${i}`).classList.add('done');
  clearTimer();

  if (i < PHASES.length - 1) {
    setPhase(i + 1);
  } else {
    showSummary();
  }
}

// ── NOTES ─────────────────────────────────────────────────
function saveNote(phaseIdx, key, val) {
  if (!notes[phaseIdx]) notes[phaseIdx] = {};
  notes[phaseIdx][key] = val;
}

function checkNext(i) {
  const btn = document.getElementById(`pnext${i}`);
  if (!btn) return;
  const p = PHASES[i];

  let ok = false;
  if (p.type === 'emotion') ok = selectedEmo !== null;
  else if (p.type === 'priority') ok = selectedPriority >= 0 && priorityItems[selectedPriority]?.trim().length > 0;
  else if (p.fields) ok = p.fields.every(f => (notes[i]?.[f.key] || '').trim().length > 0);
  else ok = true;

  btn.disabled = !ok;
}

function selectEmo(btn, val, msg) {
  document.querySelectorAll('.emo-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedEmo = val;

  const warn = document.getElementById('emoWarn');
  if (msg && val !== 'ok') {
    warn.textContent = msg;
    warn.className = 'emo-warn vis';
  } else {
    warn.className = 'emo-warn';
  }
  checkNext(0);
}

// ── TIMER ─────────────────────────────────────────────────
function toggleTimer() {
  if (timerRunning) pauseTimer(); else startTimer();
}

function startTimer() {
  if (timerSec <= 0) { timerSec = PHASES[currentPhase].mins * 60; }
  timerRunning = true;
  document.getElementById('timerBtn').textContent = '⏸ 暫停';
  timerInterval = setInterval(() => {
    timerSec--;
    renderTimer();
    if (timerSec <= 0) {
      clearTimer();
      document.getElementById('arcTime').textContent = '00:00';
    }
  }, 1000);
}

function pauseTimer() {
  timerRunning = false;
  document.getElementById('timerBtn').textContent = '▶ 繼續';
  clearInterval(timerInterval);
}

function resetTimer() {
  clearTimer();
  timerSec = PHASES[currentPhase].mins * 60;
  timerTotal = timerSec;
  renderTimer();
}

function clearTimer() {
  timerRunning = false;
  clearInterval(timerInterval);
  document.getElementById('timerBtn').textContent = '▶ 開始計時';
}

function renderTimer() {
  const m = Math.floor(timerSec / 60).toString().padStart(2, '0');
  const s = (timerSec % 60).toString().padStart(2, '0');
  const el = document.getElementById('arcTime');
  el.textContent = `${m}:${s}`;
  el.classList.toggle('warning', timerSec <= 30 && timerSec > 0);

  // arc
  const pct = timerTotal > 0 ? (timerTotal - timerSec) / timerTotal : 0;
  const circ = 138.2;
  document.getElementById('arcCircle').style.strokeDashoffset = circ - pct * circ;
}

// ── SUMMARY ───────────────────────────────────────────────
function showSummary() {
  document.getElementById('appScreen').style.display = 'none';
  const s = document.getElementById('summaryScreen');
  s.style.display = 'block';

  document.getElementById('summaryTitle').textContent = `「${topic}」策略快照`;

  const cards = [];

  // emotion
  const emoLabel = EMOTIONS.find(e => e.val === selectedEmo)?.label || '';
  cards.push({ label: '出發狀態', content: emoLabel });

  // zoom out
  const z = notes[1] || {};
  if (z.q1 || z.q2 || z.q3) {
    cards.push({ label: 'Zoom Out 三問', content: [
      z.q1 ? `問題：${z.q1}` : '',
      z.q2 ? `為誰：${z.q2}` : '',
      z.q3 ? `為何現在：${z.q3}` : ''
    ].filter(Boolean).join('\n') });
  }

  // priority
  if (selectedPriority >= 0 && priorityItems[selectedPriority]) {
    const all = priorityItems.filter(v => v.trim());
    cards.push({ label: '最優先行動', content: `✦ ${priorityItems[selectedPriority]}\n\n暫緩：${all.filter((_, i) => i !== selectedPriority).filter(v=>v).map(v=>`· ${v}`).join('  ')}` });
  }

  // sentence
  const sent = notes[3]?.strategy;
  if (sent) cards.push({ label: '一句話策略', content: sent });

  document.getElementById('summaryCards').innerHTML = cards.map(c => `
    <div class="summary-card">
      <div class="summary-card-label">${c.label}</div>
      <div class="summary-card-content">${c.content}</div>
    </div>
  `).join('');
}

function buildMarkdown() {
  const now = new Date().toISOString().slice(0, 10);
  const emoLabel = EMOTIONS.find(e => e.val === selectedEmo)?.label || '';
  const z = notes[1] || {};
  const sent = notes[3]?.strategy || '';
  const topItem = selectedPriority >= 0 ? priorityItems[selectedPriority] : '';
  const restItems = priorityItems.filter((v, i) => v.trim() && i !== selectedPriority).map(v => `- 暫緩：${v}`).join('\n');

  return `---
title: "策略快照：${topic}"
date: ${now}
type: strategy-snapshot
tags:
  - 策略思考
  - 工具輸出
---

# 策略快照：${topic}

**出發狀態**：${emoLabel}

## Zoom Out 三問
- **問題**：${z.q1 || '（未填）'}
- **為誰**：${z.q2 || '（未填）'}
- **為何現在**：${z.q3 || '（未填）'}

## 最優先行動
✦ ${topItem || '（未選）'}

${restItems}

## 一句話策略
> ${sent || '（未填）'}

---
*由謙謙爸策略思考引導器產出 · ${now}*
`;
}

function copyMarkdown() {
  const md = buildMarkdown();
  navigator.clipboard.writeText(md).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '已複製 ✓';
    setTimeout(() => btn.textContent = '複製 Markdown ↗', 2000);
  });
}

function restart() {
  document.getElementById('summaryScreen').style.display = 'none';
  document.getElementById('setupScreen').style.display = 'block';
  document.getElementById('topicInput').value = '';
  document.getElementById('startBtn').disabled = true;
}

// ── THEME ─────────────────────────────────────────────────
function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('st-theme', next);
  document.querySelector('.theme-btn').textContent = next === 'dark' ? '☀︎' : '☾';
}

const saved = localStorage.getItem('st-theme');
if (saved) {
  document.documentElement.setAttribute('data-theme', saved);
  document.querySelector('.theme-btn').textContent = saved === 'dark' ? '☀︎' : '☾';
}
</script>
</body>
</html>
